name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest ruff psutil
          pip install -e . --no-deps

      - name: Lint
        run: ruff check porcupine tests

      - name: Test
        run: pytest tests/ -v
